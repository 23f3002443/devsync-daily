
name: Daily Commit

on:
  schedule:
    - cron: '30 2 * * *'  # Runs daily at 02:30 UTC
  workflow_dispatch:       # Allows manual trigger

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Commit update for 23f3002443@ds.study.iitm.ac.in
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "23f3002443@ds.study.iitm.ac.in"
          echo "Daily update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> daily_log.txt
          git add daily_log.txt
          git commit -m "Daily automated commit - $(date -u '+%Y-%m-%d')"
          git push
